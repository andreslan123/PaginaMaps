<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento y Geocerca - Mi App</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css' rel='stylesheet' />
    
    <script src='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js'></script>
    <link rel='stylesheet' href='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css' type='text/css' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Mantenemos tus estilos geniales */
        body { margin: 0; font-family: sans-serif; background: linear-gradient(to right, #1e3c72, #6a0d91); min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: white; transition: background 0.5s; }
        header { padding: 20px; }
        main { width: 90%; max-width: 900px; }
        #info-panel { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-around; color: #333; margin-bottom: 20px; border: 2px solid black; }
        #mapa { height: 500px; width: 100%; border-radius: 15px; border: 5px solid black; }
        .coord-value { font-weight: bold; color: #6a0d91; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header><h1>Panel de Control XYZ</h1></header>

    <main>
        <div id="info-panel">
            <div><span>LATITUD: </span><span id="lat-val" class="coord-value">0.0</span></div>
            <div><span>LONGITUD: </span><span id="lng-val" class="coord-value">0.0</span></div>
        </div>
        <div id="mapa"></div>
    </main>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAKWQdiwDaCe2icelCgBciO0kl-4Y8132s",
            authDomain: "mapa-en-tiempo-real.firebaseapp.com",
            databaseURL: "https://mapa-en-tiempo-real-default-rtdb.firebaseio.com",
            projectId: "mapa-en-tiempo-real",
            storageBucket: "mapa-en-tiempo-real.firebasestorage.app",
            messagingSenderId: "204277700533",
            appId: "1:204277700533:web:fdd9a9fd587fc8ecb1abfc"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // CONFIGURACIÓN MAPBOX
        mapboxgl.accessToken = 'pk.eyJ1IjoiYW5kcmVzc2FudGljbGEiLCJhIjoiY21tNW53bWpiMDhzNTJxb205cWVrNzQ4eCJ9.hvXQqpbQpu3QHdv-GD48Fg';
        
        const map = new mapboxgl.Map({
            container: 'mapa',
            style: 'mapbox://styles/mapbox/streets-v11',
            center: [-68.1193, -16.4897],
            zoom: 15
        });

        const marker = new mapboxgl.Marker({ color: '#ff0000' }).setLngLat([-68.1193, -16.4897]).addTo(map);

        // CONFIGURACIÓN DRAW (DIBUJO)
        const draw = new MapboxDraw({
            displayControlsDefault: false,
            controls: { polygon: true, trash: true },
            defaultMode: 'draw_polygon'
        });
        map.addControl(draw);

        // VARIABLES GLOBALES PARA GEOCERCA
        let geocercaActiva = null;

        // GUARDAR GEOCERCA EN FIREBASE
        map.on('draw.create', actualizarGeocerca);
        map.on('draw.update', actualizarGeocerca);

        function actualizarGeocerca() {
            const data = draw.getAll();
            if (data.features.length > 0) {
                geocercaActiva = data.features[0]; // Guardamos el polígono completo
                const coords = geocercaActiva.geometry.coordinates[0];
                database.ref('geocerca/area').set(coords);
                console.log("Geocerca sincronizada.");
            }
        }

        // ESCUCHAR POSICIÓN DEL HONOR Y VALIDAR ALERTA
        database.ref('ubicaciones/usuario1').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.latitud && data.longitud) {
                const lat = data.latitud;
                const lng = data.longitud;

                // Actualizar UI
                document.getElementById('lat-val').innerText = lat.toFixed(6);
                document.getElementById('lng-val').innerText = lng.toFixed(6);
                marker.setLngLat([lng, lat]);
                map.flyTo({ center: [lng, lat], essential: true });

                // LÓGICA DE ALERTA SI HAY UNA GEOCERCA DIBUJADA
                if (geocercaActiva) {
                    const puntoActual = turf.point([lng, lat]);
                    const estaDentro = turf.booleanPointInPolygon(puntoActual, geocercaActiva);

                    if (!estaDentro) {
                        document.body.style.background = "red";
                        database.ref('estado/alerta').set(true);
                        // Sonido de alerta (asegúrate de tener el archivo o usa un link)
                        const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
                        audio.play();
                    } else {
                        document.body.style.background = "linear-gradient(to right, #1e3c72, #6a0d91)";
                        database.ref('estado/alerta').set(false);
                    }
                }
            }
        });
    </script>
</body>
</html>
