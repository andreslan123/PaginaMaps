<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Control Geocerca - Andres</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css' rel='stylesheet' />
    <script src='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js'></script>
    <link rel='stylesheet' href='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css' type='text/css' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a2e; 
            color: white; 
            transition: background 0.5s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        header { padding: 20px; text-align: center; }
        #info-panel { 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
            display: flex; 
            gap: 20px; 
            color: #333; 
            margin: 20px; 
            border: 3px solid #6a0d91; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #mapa { 
            height: 500px; 
            width: 90%; 
            max-width: 1000px;
            border-radius: 15px; 
            border: 4px solid #000; 
        }
        .val { font-weight: bold; color: #6a0d91; font-size: 1.2rem; }
        h1 { margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <h1>Seguimiento Honor en Tiempo Real</h1>
        <p>Dibuja un polígono en el mapa para activar la geocerca</p>
    </header>

    <div id="info-panel">
        <div>LATITUD: <span id="lat-val" class="val">0.000000</span></div>
        <div>LONGITUD: <span id="lng-val" class="val">0.000000</span></div>
    </div>

    <div id="mapa"></div>

    <script>
        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAKWQdiwDaCe2icelCgBciO0kl-4Y8132s",
            authDomain: "mapa-en-tiempo-real.firebaseapp.com",
            databaseURL: "https://mapa-en-tiempo-real-default-rtdb.firebaseio.com",
            projectId: "mapa-en-tiempo-real",
            storageBucket: "mapa-en-tiempo-real.firebasestorage.app",
            messagingSenderId: "204277700533",
            appId: "1:204277700533:web:fdd9a9fd587fc8ecb1abfc"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. CONFIGURACIÓN MAPBOX
        mapboxgl.accessToken = 'pk.eyJ1IjoiYW5kcmVzc2FudGljbGEiLCJhIjoiY21tNW53bWpiMDhzNTJxb205cWVrNzQ4eCJ9.hvXQqpbQpu3QHdv-GD48Fg';
        
        const map = new mapboxgl.Map({
            container: 'mapa',
            style: 'mapbox://styles/mapbox/streets-v11',
            center: [-68.1193, -16.4897],
            zoom: 15
        });

        // Marcador del celular
        const marker = new mapboxgl.Marker({ color: 'red' }).setLngLat([-68.1193, -16.4897]).addTo(map);

        // Herramientas de dibujo
        const draw = new MapboxDraw({
            displayControlsDefault: false,
            controls: { polygon: true, trash: true }
        });
        map.addControl(draw);

        let geocercaActiva = null;

        // 3. EVENTOS DE DIBUJO
        function actualizarGeocerca(e) {
            const data = draw.getAll();
            if (data.features.length > 0) {
                geocercaActiva = data.features[0];
                // Guardar coordenadas en Firebase para referencia (opcional)
                database.ref('geocerca/area').set(geocercaActiva.geometry.coordinates[0]);
            } else {
                geocercaActiva = null;
                database.ref('estado/alerta').set(false);
                document.body.style.background = "#1a1a2e";
            }
        }

        map.on('draw.create', actualizarGeocerca);
        map.on('draw.update', actualizarGeocerca);
        map.on('draw.delete', actualizarGeocerca);

        // 4. ESCUCHAR AL CELULAR (FIREBASE)
        database.ref('ubicaciones/usuario1').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const lat = data.latitud;
                const lng = data.longitud;

                // Actualizar números en pantalla
                document.getElementById('lat-val').innerText = lat.toFixed(6);
                document.getElementById('lng-val').innerText = lng.toFixed(6);
                
                // Mover marcador y cámara
                marker.setLngLat([lng, lat]);
                map.flyTo({ center: [lng, lat], essential: true });

                // 5. LÓGICA DE GEOCERCA (TURF.JS)
                if (geocercaActiva) {
                    const pt = turf.point([lng, lat]);
                    const dentro = turf.booleanPointInPolygon(pt, geocercaActiva);
                    
                    if (!dentro) {
                        // FUERA DE LA GEOCERCA
                        document.body.style.background = "#8B0000"; // Rojo oscuro
                        database.ref('estado/alerta').set(true);
                        
                        // Intentar sonar alerta (el navegador puede bloquearlo si no has hecho click)
                        const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
                        audio.play().catch(e => console.log("Audio bloqueado hasta interacción"));
                    } else {
                        // DENTRO DE LA GEOCERCA
                        document.body.style.background = "#1a1a2e"; // Color original
                        database.ref('estado/alerta').set(false);
                    }
                }
            }
        });
    </script>
</body>
</html>
